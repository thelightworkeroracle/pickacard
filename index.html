<!DOCTYPE html>
<html>
<head>
<title>The Lightworkers Oracle</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#f5efe6,#e8dfd4,#d9cfc3);
text-align:center;
padding:40px;
color:#3a342f;
}

#header{
margin-bottom:40px;
}

/* CARD AREA */

#card-grid{
position:relative;
width:900px;
height:260px;
margin:60px auto;
}

/* CARD */

.card{
position:absolute;
width:140px;
cursor:pointer;
transition:transform .25s;
}

.card img{
width:100%;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.card:hover{
transform:translateY(-25px) scale(1.05);
z-index:20;
}

/* RESULT */

#result{
display:none;
max-width:1000px;
margin:auto;
margin-top:60px;
gap:40px;
align-items:flex-start;
}

#result img{
width:260px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#reading{
text-align:left;
background:white;
padding:30px;
border-radius:12px;
line-height:1.7;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.section{
margin-top:15px;
}

.section b{
display:block;
margin-bottom:5px;
}

</style>
</head>

<body>

<div id="header">
<h1>🔮 The Lightworkers Oracle</h1>
<p>Take a deep breath and choose the card you feel drawn to.</p>
</div>

<div id="card-grid"></div>

<div id="result">

<img id="chosen-card">

<div id="reading"></div>

</div>

cards.forEach((card,i)=>{

cardDiv.style.left=(i*80)+"px"

cardDiv.innerHTML=`<img src="${backImage}">`

cardDiv.onclick=function(){

document.getElementById("header").style.display="none"
grid.style.display="none"

document.getElementById("result").style.display="flex"

document.getElementById("chosen-card").src=card.image

document.getElementById("reading").innerHTML=`

<h2>${card.title}</h2>

<div class="section">
<b>Affirmation</b>
${card.affirmation}
</div>

<div class="section">
