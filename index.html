<!DOCTYPE html>
<html>
<head>
<title>The Lightworkers Oracle</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#f5efe6,#e8dfd4,#d9cfc3);
text-align:center;
padding:40px;
color:#3a342f;
}

#header{
margin-bottom:40px;
}

/* CARD AREA */

#card-grid{
position:relative;
width:900px;
height:260px;
margin:60px auto;
}

/* CARD */

.card{
position:absolute;
width:140px;
cursor:pointer;
transition:transform .25s;
}

.card img{
width:100%;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.card:hover{
transform:translateY(-25px) scale(1.05);
z-index:20;
}

/* RESULT */

#result{
display:none;
max-width:1000px;
margin:auto;
margin-top:60px;
gap:40px;
align-items:flex-start;
}

#result img{
width:260px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#reading{
text-align:left;
background:white;
padding:30px;
border-radius:12px;
line-height:1.7;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.section{
margin-top:15px;
}

.section b{
display:block;
margin-bottom:5px;
}

</style>
</head>

<body>

<div id="header">
<h1>🔮 The Lightworkers Oracle</h1>
<p>Take a deep breath and choose the card you feel drawn to.</p>
</div>

<div id="card-grid"></div>

<div id="result">

<img id="chosen-card">

<div id="reading"></div>

</div>

<script>

const backImage="https://res.cloudinary.com/dqeukcxav/image/upload/v1773237777/back_nymcit.png"

const cards=[

{

affirmation:"I move through life as though I am being initiated",
message:"Life is guiding you through an initiation into the next version of yourself.",
activation:"Ho raa shee ne yti u sha"
},

{
title:"Multidimensionality",

affirmation:"I choose to anchor my light from different directions into the heart of Gaia",
message:"You are a multidimensional being carrying gifts across timelines.",
activation:"Ey ra ee se ho na hee se"
},

{

affirmation:"I allow the tools I use to guide me ahead on this journey",

activation:"hurr ha rey so ne hurr sho ya kay"
},

{

image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237777/pleasure-path_m2s0zg.png",
affirmation:"I allow myself to open up and receive pleasure",
message:"Slow down and reconnect with the beauty of living.",
activation:"Aa se niiii reyyy ho to ke ma"
},

{
title:"Frequency Keeper",
image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237776/frequency-keeper_ja6xec.png",
affirmation:"I am a portal for transmuting frequencies",
message:"Your energy transforms the vibration of spaces.",
activation:"Aa lah re sheee no ya ke ri yah"
},

{
title:"Sangha",
image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237777/sangha_rjix7o.png",
affirmation:"I am calling forward my Sangha who are here to walk this path with me",
message:"Your soul family is aligning with you.",
activation:"Sho ray hay sto ni ko yi pa yaaal"
},

{
title:"Deep Sleep",
image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237776/deep-sleep_vzdftc.png",
affirmation:"I embrace this season of rest",
message:"Trust the cycles of rest and renewal.",
activation:"She she ni ye ki she ri hey"
},

{

affirmation:"I rise out of the ashes that once buried me",
message:"Cleansing and rebirth energy surrounds you.",
activation:"Shay ya ho ne do ya he ka ji ho"
},

{
title:"The Artist",
image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237776/the-artist_drz0tf.png",

activation:"Ho hum ke ya tu re um te syha"
},

{
title:"The System Disruptor",
image:"https://res.cloudinary.com/dqeukcxav/image/upload/v1773237776/system-disruptor_lvg3t8.png",
affirmation:"I am here to create my own path",
message:"You are here to birth new ideas.",
activation:"Ul shi ke ri hu ya ja ni hi kaaash"
}

]

const grid=document.getElementById("card-grid")

cards.forEach((card,i)=>{

const cardDiv=document.createElement("div")
cardDiv.className="card"

cardDiv.style.left=(i*80)+"px"

cardDiv.innerHTML=`<img src="${backImage}">`

cardDiv.onclick=function(){

document.getElementById("header").style.display="none"
grid.style.display="none"

document.getElementById("result").style.display="flex"

document.getElementById("chosen-card").src=card.image

document.getElementById("reading").innerHTML=`

<h2>${card.title}</h2>

<div class="section">
<b>Affirmation</b>
${card.affirmation}
</div>

<div class="section">
<b>Message</b>
${card.message}
</div>

<div class="section">
<b>Activation</b>
${card.activation}
</div>

`

}

grid.appendChild(cardDiv)

})

</script>

</body>
</html>
